<svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <!-- 连接减CD: Bullet hits tower → that tower's CD -0.5s (target) -->
  <rect width="64" height="64" rx="10" fill="#280048"/>
  <!-- Arrow pointing right = affects target -->
  <line x1="6" y1="26" x2="40" y2="26" stroke="#aa55ff" stroke-width="5" stroke-linecap="round"/>
  <polygon points="36,18 54,26 36,34" fill="#aa55ff"/>
  <!-- Target clock bottom-right = that tower's CD -->
  <circle cx="50" cy="50" r="11" fill="none" stroke="#cc88ff" stroke-width="2.5"/>
  <line x1="50" y1="42" x2="50" y2="50" stroke="#cc88ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="55" y2="53" stroke="#cc88ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Minus = reduction -->
  <rect x="44" y="49" width="12" height="2.5" rx="1" fill="white"/>
</svg>
