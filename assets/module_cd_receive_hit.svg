<svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <!-- 受击减CD: Tower receives bullet hit → own CD -0.5s -->
  <rect width="64" height="64" rx="10" fill="#003030"/>
  <!-- Shield shape -->
  <path d="M32 8 L52 18 L52 36 Q52 50 32 58 Q12 50 12 36 L12 18 Z" fill="#006666" stroke="#00ddcc" stroke-width="2"/>
  <!-- Incoming bullet arrow (from right, hitting shield) -->
  <line x1="56" y1="32" x2="40" y2="32" stroke="#00ffcc" stroke-width="4" stroke-linecap="round"/>
  <polygon points="46,26 34,32 46,38" fill="#00ffcc"/>
  <!-- Minus inside shield = CD reduction -->
  <rect x="24" y="31" width="16" height="3.5" rx="1.5" fill="white" opacity="0.9"/>
</svg>
